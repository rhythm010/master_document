version: "3.8"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: companion
      POSTGRES_PASSWORD: companion
      POSTGRES_DB: companion
    ports:
      - "5432:5432"
    volumes:
      - db-data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  db-data:
